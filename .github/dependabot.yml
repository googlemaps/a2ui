version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/client/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/agent/python_agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7