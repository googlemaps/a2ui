name: Web CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client/web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: client/web

      - name: Build
        run: npm run build
        working-directory: client/web
